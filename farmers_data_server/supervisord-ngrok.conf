[supervisord]
nodaemon=true
user=farmer
logfile=/var/log/supervisor/supervisord.log
pidfile=/tmp/supervisord.pid

[program:fastapi]
command=uvicorn main:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
user=farmer
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=1

[program:ngrok]
command=/usr/local/bin/ngrok http 8000 --authtoken=%(ENV_NGROK_AUTHTOKEN)s --log=stdout
directory=/app
autostart=true
autorestart=true
user=farmer
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=2
startsecs=5
