name: Deploy Backend to Production Server

on:
  push:
    branches:
      - main
      - feat-backend-deployment
    paths:
      - 'bsads_backend_and_fast_api/**'
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/bsads-api
  CONTAINER_NAME: bsads-api-production
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ademneadev
  SERVER_PORT: 8085

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./bsads_backend_and_fast_api
          file: ./bsads_backend_and_fast_api/Dockerfile.production
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

      - name: 🚀 Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            echo "📥 Pulling latest image..."
            docker pull ${{ env.DOCKER_IMAGE }}:latest
            
            echo "🛑 Stopping existing container..."
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            
            echo "🚀 Starting new container on port ${{ env.SERVER_PORT }}..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              --add-host=host.docker.internal:host-gateway \
              -p ${{ env.SERVER_PORT }}:${{ env.SERVER_PORT }} \
              -p 5433:5432 \
              -v bsads-data:/var/lib/postgresql \
              -v bsads-uploads:/app/uploads \
              -e DATABASE_URL="postgresql://bee_user:bee_user@localhost:5432/bee_db" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e HF_SPACE_NAME="${{ secrets.HF_SPACE_NAME }}" \
              -e HF_TOKEN="${{ secrets.HF_TOKEN }}" \
              -e PORT=8085 \
              ${{ env.DOCKER_IMAGE }}:latest
            
            echo "⏳ Waiting for container to start..."
            sleep 15
            
            echo "🔍 Checking container status..."
            docker ps | grep ${{ env.CONTAINER_NAME }} || exit 1            
            
            echo "✅ Deployment successful!"

      - name: 📊 Deployment summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **API URL:** http://${{ env.SERVER_HOST }}:${{ env.SERVER_PORT }}" >> $GITHUB_STEP_SUMMARY
          echo "📚 **API Docs:** http://${{ env.SERVER_HOST }}:${{ env.SERVER_PORT }}/docs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKER_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Deployment failed
        if: failure()
        run: |
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Debug commands:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} 'docker logs ${{ env.CONTAINER_NAME }}'" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
