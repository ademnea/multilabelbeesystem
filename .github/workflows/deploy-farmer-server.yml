name: Deploy Farmer Data Source to Production

on:
  push:
    branches:
      - main
    paths:
      - 'farmers_data_server/**'
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/farmer-data-source
  CONTAINER_NAME: farmer-data-source
  SERVER_HOST: 196.43.168.57
  SERVER_USER: ademneadev
  SERVER_PORT: 8086

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./farmers_data_server
          file: ./farmers_data_server/Dockerfile.with-ngrok
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

      - name: 🚀 Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            echo "📥 Pulling latest image..."
            docker pull ${{ env.DOCKER_IMAGE }}:latest
            
            echo "🛑 Stopping existing container..."
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            
            echo "🚀 Starting new container on port ${{ env.SERVER_PORT }}..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.SERVER_PORT }}:8000 \
              -v farmer-recordings:/home/farmer/recordings \
              -v farmer-hive-conditions:/home/farmer/hive_conditions \
              -v farmer-data:/data \
              -e ADMIN_KEY="${{ secrets.FARMER_ADMIN_KEY }}" \
              -e RECORDINGS_DIR="/home/farmer/recordings" \
              -e HIVE_CONDITIONS_DIR="/home/farmer/hive_conditions" \
              -e KEYS_FILE="/data/api_keys.json" \
              -e NGROK_AUTHTOKEN="${{ secrets.NGROK_AUTHTOKEN }}" \
              ${{ env.DOCKER_IMAGE }}:latest
            
            echo "⏳ Waiting for container to start..."
            sleep 10
            
            echo "🔍 Checking container status..."
            docker ps | grep ${{ env.CONTAINER_NAME }} || exit 1
            
            echo "🔍 Testing health endpoint..."
            curl -f http://localhost:${{ env.SERVER_PORT }}/health || exit 1
            
            echo "✅ Deployment successful!"

      - name: 📊 Deployment summary
        if: success()
        run: |
          echo "## ✅ Farmer Data Source Deployed! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **API URL:** http://${{ env.SERVER_HOST }}:${{ env.SERVER_PORT }}" >> $GITHUB_STEP_SUMMARY
          echo "📚 **API Docs:** http://${{ env.SERVER_HOST }}:${{ env.SERVER_PORT }}/docs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKER_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Port:** ${{ env.SERVER_PORT }}" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Deployment failed
        if: failure()
        run: |
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
