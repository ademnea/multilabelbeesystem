name: Expo Android Release CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test
        continue-on-error: false

  version-and-release:
    name: Semantic Version & Release
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new-release-tag: ${{ steps.semantic-release.outputs.new_release_tag }}
      new-release-published: ${{ steps.semantic-release.outputs.new_release_published }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release
        id: semantic-release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: latest
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android APK
    needs: [test, version-and-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install npm dependencies
        run: npm ci

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Clean Android build
        run: cd android && ./gradlew clean

      - name: Build Android APKs (Debug & Release)
        run: cd android && ./gradlew assembleDebug assembleRelease

      - name: Upload APKs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-app-apks
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk

      - name: Check if semantic release created a tag
        id: check-semantic-tag
        uses: actions/github-script@v7
        with:
          script: |
            if (${{ needs.version-and-release.outputs.new-release-published == 'true' }}) {
              return { 
                tagName: "${{ needs.version-and-release.outputs.new-release-tag }}", 
                exists: true 
              };
            }
            try {
              const latestRelease = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              return { tagName: latestRelease.data.tag_name, exists: true };
            } catch (error) {
              return { tagName: null, exists: false };
            }

      - name: Attach APKs to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
          tag_name: ${{ fromJSON(steps.check-semantic-tag.outputs.result).tagName || 'v1.0.0' }}
          name: ${{ fromJSON(steps.check-semantic-tag.outputs.result).exists && format('Release {0}', fromJSON(steps.check-semantic-tag.outputs.result).tagName) || 'Initial Release' }}
          token: ${{ secrets.GITHUB_TOKEN }}