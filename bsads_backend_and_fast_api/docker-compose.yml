# version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT STACK
# Starts PostgreSQL + FastAPI together so you can test without Railway.
#
# Usage:
#   docker compose up --build          # first run (builds image + starts DB)
#   docker compose up                  # subsequent runs
#   docker compose down -v             # stop and wipe the database volume
#
# API:          http://localhost:8000
# Swagger docs: http://localhost:8000/docs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       bee_db
      POSTGRES_USER:     bee_user
      POSTGRES_PASSWORD: bee_user
    ports:
      - "5433:5432"          # Docker PostgreSQL on port 5433 (system PostgreSQL is on 5432)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bee_user -d bee_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"          # Docker API on port 8001 (system API is on 8000)
    environment:
      # Override DATABASE_URL so the app connects to the local db container
      DATABASE_URL: postgresql://bee_user:bee_user@db:5432/bee_db
      PORT: 8000
    env_file:
      - .env                 # loads SECRET_KEY, HF_TOKEN, HF_SPACE_NAME, etc.
    depends_on:
      db:
        condition: service_healthy
    # volumes:
    #   # Persist manually uploaded audio files between restarts
    #   - ./uploads:/app/uploads

volumes:
  pgdata:
    driver: local
